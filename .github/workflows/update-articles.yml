name: Update Articles

on:
  schedule:
    - cron: '0 12 * * *'   # 7am Eastern (UTC-5) = 12:00 UTC
    - cron: '0 0 * * *'    # 7pm Eastern (UTC-5) = 00:00 UTC next day
  workflow_dispatch:         # Allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run article updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_articles.py

      - name: Commit and push updated index.html
        run: |
          git config user.name "Items Research Bot"
          git config user.email "bot@itemsresearch.news"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update articles $(date +'%Y-%m-%d %H:%M')"
          git push
